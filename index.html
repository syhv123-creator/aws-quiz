<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Exam Simulator - 호용</title>
    <style>
        :root {
            --bg: #f4f7f6; --card-bg: #ffffff; --text: #232f3e;
            --primary: #ff9900; --secondary: #007dbc;
            --success: #28a745; --error: #dc3545;
        }
        body.dark-mode {
            --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --secondary: #38bdf8;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* 모드 선택 화면 */
        #mode-selection { text-align: center; padding: 50px 0; }
        .mode-btn { width: 100%; padding: 20px; margin: 10px 0; font-size: 1.2rem; border-radius: 15px; border: 2px solid var(--primary); background: var(--card-bg); color: var(--text); cursor: pointer; transition: 0.2s; }
        .mode-btn:hover { background: var(--primary); color: white; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .timer { font-weight: bold; color: var(--error); font-size: 1.1rem; }
        
        .option { 
            padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; 
            background: none; color: var(--text); text-align: left; cursor: pointer; 
            margin-bottom: 10px; width: 100%; font-size: 1rem;
        }
        .option.selected { border-color: var(--primary); background: rgba(255, 153, 0, 0.1); }
        .option.correct { border-color: var(--success); background: rgba(40, 167, 69, 0.1); }
        .option.wrong { border-color: var(--error); background: rgba(220, 53, 69, 0.1); }

        .answer-section { display: none; margin-top: 20px; padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.05); }
        .btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-orange { background: var(--primary); color: white; }
        .theme-toggle { position: fixed; top: 10px; right: 10px; padding: 5px 10px; border-radius: 15px; border: 1px solid var(--primary); cursor: pointer; background: var(--card-bg); color: var(--text); font-size: 0.8rem; }
        #quiz-app { display: none; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleDarkMode()">🌙 테마</button>

    <div class="container">
        <div id="mode-selection" class="card">
            <h1>AWS 자격증 도전! 🚀</h1>
            <p>공부 방식을 선택해 주세요.</p>
            <button class="mode-btn" onclick="startApp('study')">📖 학습 모드 (전체 풀기)</button>
            <button class="mode-btn" onclick="startApp('exam')">⏱️ 시험 모드 (65문항/90분)</button>
        </div>

        <div id="quiz-app" class="card">
            <div class="header">
                <span id="progress"></span>
                <span id="timer" class="timer"></span>
            </div>
            <h2 id="question"></h2>
            <div id="options"></div>
            
            <button id="submit-btn" class="btn btn-orange" onclick="handleInteraction()">정답 확인</button>

            <div id="answer-box" class="answer-section">
                <div id="ans-status" style="font-weight: bold; font-size: 1.1rem;"></div>
                <p id="explanation" style="font-size: 0.9rem; margin-top: 10px;"></p>
                <button class="btn" style="background: var(--text); color: var(--card-bg);" onclick="nextQuestion()">다음 문제 ❯</button>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let quizData = [];
        let currentIndex = 0;
        let score = 0;
        let isExamMode = false;
        let timerInterval;
        let timeLeft = 90 * 60; // 90분

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        // 데이터 로드
        fetch('quiz_data.json').then(res => res.json()).then(data => { allData = data; });

        function startApp(mode) {
            document.getElementById('mode-selection').style.display = 'none';
            document.getElementById('quiz-app').style.display = 'block';
            
            if (mode === 'exam') {
                isExamMode = true;
                // 65문제 랜덤 추출
                quizData = allData.sort(() => Math.random() - 0.5).slice(0, 65);
                startTimer();
            } else {
                quizData = allData.sort(() => Math.random() - 0.5);
            }
            displayQuiz();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                document.getElementById('timer').innerText = `남은 시간: ${min}:${sec < 10 ? '0'+sec : sec}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("시간이 종료되었습니다!");
                    finishExam();
                }
            }, 1000);
        }

        function displayQuiz() {
            const q = quizData[currentIndex];
            document.getElementById('progress').innerText = `문제 ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('question').innerText = q.question;
            document.getElementById('options').innerHTML = '';
            document.getElementById('answer-box').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('submit-btn').innerText = isExamMode ? "다음 단계" : "정답 확인";

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => {
                    document.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                document.getElementById('options').appendChild(btn);
            });
        }

        function handleInteraction() {
            const selected = document.querySelector('.option.selected');
            if (!selected) return alert("보기를 선택하세요!");
            
            if (isExamMode) {
                // 시험 모드는 정답을 바로 보여주지 않고 다음 문제로 (또는 선택 저장)
                // 하지만 학습 효과를 위해 '시험 모드'에서도 결과 제출 전까진 다음으로 넘기기만 함
                // 여기서는 간단하게 시험 모드도 결과를 바로 확인하게 하되 마지막 성적표를 강조함
                checkAnswer(selected);
            } else {
                checkAnswer(selected);
            }
        }

        function checkAnswer(selected) {
            const q = quizData[currentIndex];
            const isCorrect = selected.innerText[0] === q.answer;
            if (isCorrect) score++;

            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('answer-box').style.display = 'block';
            document.getElementById('ans-status').innerText = isCorrect ? "✅ 정답입니다!" : `❌ 오답 (정답: ${q.answer})`;
            document.getElementById('ans-status').style.color = isCorrect ? "var(--success)" : "var(--error)";
            document.getElementById('explanation').innerText = q.explanation;
            
            document.querySelectorAll('.option').forEach(btn => {
                if (btn.innerText[0] === q.answer) btn.classList.add('correct');
                else if (btn.classList.contains('selected')) btn.classList.add('wrong');
            });
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < quizData.length) {
                displayQuiz();
            } else {
                finishExam();
            }
        }

        function finishExam() {
            clearInterval(timerInterval);
            const percent = Math.round((score / quizData.length) * 100);
            const passFail = percent >= 70 ? "🎉 합격입니다!" : "😅 아쉽지만 불합격입니다.";
            alert(`시험 종료!\n점수: ${percent}점 (${score}/${quizData.length})\n${passFail}`);
            location.reload();
        }
    </script>
</body>
</html>
