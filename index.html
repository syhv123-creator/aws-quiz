<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Practitioner 정복 - 호용</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #232f3e;
            --primary: #ff9900; /* AWS Orange */
            --secondary: #007dbc;
            --success: #28a745;
            --error: #dc3545;
        }
        /* 다크모드 설정 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text: #f8fafc;
                --secondary: #38bdf8;
            }
        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; }
        .score-badge { background: var(--secondary); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; }
        
        h2 { font-size: 1.15rem; line-height: 1.6; margin-bottom: 25px; min-height: 80px; }
        
        .options-grid { display: grid; gap: 12px; }
        .option { 
            padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; 
            background: none; color: var(--text); text-align: left; cursor: pointer; 
            transition: 0.2s; font-size: 1rem; width: 100%;
        }
        .option:hover { border-color: var(--primary); background: rgba(255, 153, 0, 0.05); }
        .option.selected { border-color: var(--primary); background: rgba(255, 153, 0, 0.1); font-weight: bold; }
        .option.correct-flash { border-color: var(--success); background: rgba(40, 167, 69, 0.1); }
        .option.wrong-flash { border-color: var(--error); background: rgba(220, 53, 69, 0.1); }

        .answer-section { display: none; margin-top: 25px; padding: 20px; border-radius: 12px; background: rgba(0, 125, 188, 0.05); border-left: 6px solid var(--secondary); animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ans-status { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .exp-text { line-height: 1.7; font-size: 0.95rem; color: var(--text); opacity: 0.9; }

        .nav-btns { display: flex; gap: 12px; margin-top: 25px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-check { background: var(--primary); color: white; }
        .btn-next { background: var(--text); color: var(--card-bg); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <span id="progress">Loading...</span>
                <span class="score-badge">정답 수: <span id="score-count">0</span></span>
            </div>
            
            <h2 id="question">문제를 불러오는 중입니다...</h2>
            <div class="options-grid" id="options"></div>
            
            <div class="nav-btns" id="control-btns">
                <button class="btn btn-check" id="check-btn" onclick="showAnswer()">정답 확인</button>
            </div>

            <div id="answer-box" class="answer-section">
                <div class="ans-status" id="ans-status"></div>
                <div class="exp-text"><strong>💡 해설:</strong> <span id="explanation"></span></div>
                <div class="nav-btns">
                    <button class="btn btn-next" onclick="nextQuestion()">다음 문제 ❯</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;

        // 1. 데이터 로드 및 랜덤 섞기
        fetch('quiz_data.json')
            .then(res => res.json())
            .then(data => {
                // 문제 순서 랜덤 섞기 (Shuffle)
                quizData = data.sort(() => Math.random() - 0.5);
                displayQuiz();
            })
            .catch(err => {
                document.getElementById('question').innerText = "데이터 로드 실패! Live Server를 사용하세요.";
            });

        function displayQuiz() {
            isAnswered = false;
            const q = quizData[currentIndex];
            document.getElementById('progress').innerText = `문제 ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('question').innerText = q.question;
            document.getElementById('answer-box').style.display = 'none';
            document.getElementById('check-btn').disabled = false;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = function() {
                    if(isAnswered) return;
                    document.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                };
                optionsDiv.appendChild(btn);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showAnswer() {
            const selected = document.querySelector('.option.selected');
            if (!selected) {
                alert("보기를 선택해 주세요!");
                return;
            }

            isAnswered = true;
            const q = quizData[currentIndex];
            const selectedText = selected.innerText[0]; // "A" 또는 "B" 추출
            const statusDiv = document.getElementById('ans-status');
            const checkBtn = document.getElementById('check-btn');

            checkBtn.disabled = true;

            if (selectedText === q.answer) {
                statusDiv.innerText = "✅ 정답입니다!";
                statusDiv.style.color = "var(--success)";
                selected.classList.add('correct-flash');
                score++;
                document.getElementById('score-count').innerText = score;
            } else {
                statusDiv.innerText = `❌ 틀렸습니다. (정답: ${q.answer})`;
                statusDiv.style.color = "var(--error)";
                selected.classList.add('wrong-flash');
                // 정답인 버튼을 찾아 초록색으로 표시
                document.querySelectorAll('.option').forEach(btn => {
                    if(btn.innerText[0] === q.answer) btn.classList.add('correct-flash');
                });
            }

            document.getElementById('explanation').innerText = q.explanation || "해설 데이터가 없습니다.";
            document.getElementById('answer-box').style.display = 'block';
            
            // 해설창으로 부드럽게 이동
            setTimeout(() => {
                document.getElementById('answer-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function nextQuestion() {
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                displayQuiz();
            } else {
                alert(`모든 문제를 풀었습니다! 최종 점수: ${score} / ${quizData.length}`);
                location.reload(); // 처음부터 다시 시작
            }
        }
    </script>
</body>
</html>
